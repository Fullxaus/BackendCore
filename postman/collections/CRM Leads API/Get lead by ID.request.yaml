$kind: http-request
description: Получить лида по ID. 200 после Create, 404 если ID не существует.
url: "{{baseUrl}}/api/leads/{{leadId}}"
method: GET
headers:
  Accept: application/json
scripts:
  - type: afterResponse
    code: |-
      pm.test('Status 200 or 404', function () {
        pm.expect([200, 404]).to.include(pm.response.code);
      });
      if (pm.response.code === 200) {
        pm.test('Response is LeadResponse', function () {
          const body = pm.response.json();
          pm.expect(body).to.have.property('id');
          pm.expect(body.id).to.eql(pm.collectionVariables.get('leadId'));
        });
      }
    language: text/javascript
order: 3000
