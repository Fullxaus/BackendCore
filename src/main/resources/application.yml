logging:
  level:
    ROOT: DEBUG
    org.springframework.web: DEBUG

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    # Основной вход — /swagger-ui.html (редирект на index). Прямой URL: /swagger-ui/index.html
    path: /swagger-ui.html
    url: /v3/api-docs
    operationsSorter: method
    tagsSorter: alpha

server:
  port: 8081
  error:
    include-stacktrace: always

spring:
  application:
    name: mentee-power-crm
  liquibase:
    change-log: classpath:db/changelog/db.changelog-master.yaml
  jpa:
    show-sql: true
  jackson:
    default-property-inclusion: non_null
    serialization:
      indent-output: true
    deserialization:
      fail-on-unknown-properties: false

resilience4j:
  retry:
    instances:
      email-validation:
        max-attempts: 3
        wait-duration: 500ms

email:
  validation:
    base-url: ${EMAIL_VALIDATION_URL:http://localhost:8089}

gg:
  jte:
    templateLocation: src/main/jte
    developmentMode: true



